services:
  - type: web
    name: skillable-intelligence
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
