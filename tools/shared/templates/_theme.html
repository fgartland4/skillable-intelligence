{# Shared theme — include inside <style> tags in any template.
   Single source of truth for brand colors, score colors, and reusable classes.
   All values use CSS variables — no hardcoded hex anywhere else. #}

/* ── Brand palette ──────────────────────────────────────────────── */
:root {
    --sk-sidebar:        #0A3E28;
    --sk-primary:        #136945;
    --sk-accent:         #24ED9B;
    --sk-accent-muted:   #7dd8b8;

    /* Score colors */
    --sk-score-high:     #24ED9B;
    --sk-score-mid:      #f59e0b;
    --sk-score-low:      #e05252;
    --sk-score-low-soft: #f87171;

    /* Evidence qualifier colors */
    --sk-blocker:        #e05252;
    --sk-risk:           #f59e0b;
    --sk-strength:       #24ED9B;
    --sk-context:        #94a3b8;

    /* Dark theme (Inspector, Prospector) */
    --sk-bg:             #060f0b;
    --sk-surface:        #0c1f19;
    --sk-border:         #1e3329;
    --sk-text:           #e8f5f0;
    --sk-text-body:      #c8ddd6;
    --sk-text-muted:     #6b9e88;
    --sk-text-dim:       #4a7060;

    /* Classification badge colors (NOT scoring colors) */
    --sk-classify-purple:       #a78bfa;
    --sk-classify-purple-light: #c4a7fa;
    --sk-classify-purple-bg:    rgba(112,0,255,0.12);
    --sk-classify-purple-bdr:   rgba(112,0,255,0.22);
    --sk-classify-teal:         #2dd4bf;
    --sk-classify-teal-bg:      rgba(20,184,166,0.1);
    --sk-classify-teal-bdr:     rgba(20,184,166,0.22);
    --sk-classify-blue:         #60a5fa;
    --sk-classify-blue-bg:      rgba(59,130,246,0.1);
    --sk-classify-blue-bdr:     rgba(59,130,246,0.22);

    /* Info modal — light theme (white background, dark text, WCAG AA) */
    --sk-modal-bg:          #ffffff;
    --sk-modal-text:        #1a1a2e;
    --sk-modal-text-body:   #333333;
    --sk-modal-text-muted:  #666666;
    --sk-modal-text-dim:    #888888;
    --sk-modal-border:      #e0e0e0;
    --sk-modal-border-light:#f0f0f0;
    --sk-modal-bg-hover:    #f8fdf9;
    --sk-modal-bg-nav:      #f0faf5;
    --sk-modal-border-nav:  #d4f0e4;
    --sk-modal-bg-table:    #fafafa;
    --sk-modal-link:        #0d7a4f;
    --sk-modal-close-bg:    rgba(255,255,255,0.9);

    /* Text scale (extension of dark theme above) */
    --sk-text-strong:    #ffffff;
    --sk-text-faint:     #4a5550;

    /* Card / surface scale (extension of dark theme above) */
    --sk-bg-page:        #0a1a14;
    --sk-bg-card:        #0d2219;
    --sk-bg-card-soft:   #0a1810;
    --sk-bg-card-org:    #121a16;
    --sk-bg-card-org-soft: #0f1612;
    --sk-bg-surface-low: #0a1410;
    --sk-border-card:    #1a3a2a;
    --sk-border-card-org: #25352a;
    --sk-border-accent:  #1a5a3a;
    --sk-border-soft:    #15241c;
    --sk-hover-bg:       #163a28;
    --sk-hover-bg-active: #1a4a30;
    --sk-accent-soft:    #1cc87a;
    --sk-accent-pale:    var(--sk-accent-pale);
    --sk-link-slate:     #7e9cc4;

    /* Scoring badge chip backgrounds/borders (used in dark theme) */
    --sk-badge-green-bg:     #0d3d25;
    --sk-badge-amber-bg:     #3d2a0d;
    --sk-badge-amber-bdr:    #5a4a1a;
    --sk-badge-red-bg:       #3d1515;
    --sk-badge-red-bdr:      #6a2a2a;
    --sk-badge-gray-bg:      #1e2420;
    --sk-badge-gray-bdr:     #3a3a3a;
    --sk-badge-purple-bg:    #1a1428;
    --sk-badge-purple-bdr:   #3a2a5a;

    /* Score bar gradients */
    --sk-bar-amber-dark: #6a5a1b;
    --sk-bar-amber-light: #d4a017;
    --sk-bar-red-dark:   #5a1a1a;
    --sk-bar-red-light:  #ff5555;
    --sk-bar-gray-dark:  #2a2a2a;
    --sk-bar-gray-light: #666666;
}

/* ── Score color classes ────────────────────────────────────────── */
.score-dark-green { color: var(--sk-score-high); font-weight: 800; }
.score-green      { color: var(--sk-score-high); font-weight: 700; }
.score-light-amber { color: var(--sk-score-mid); font-weight: 700; }
.score-amber      { color: var(--sk-score-mid); font-weight: 700; }
.score-red        { color: var(--sk-score-low-soft); font-weight: 700; }

/* ── Organization type badges — three color groups ────────────── */
.org-badge {
    display: inline-block; font-size: 0.56rem; font-weight: 700;
    padding: 3px 9px; border-radius: 20px; vertical-align: middle;
    margin-left: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    border: 1px solid;
}
/* Purple — product creators (software, enterprise) */
.org-purple {
    color: var(--sk-classify-purple);
    background: var(--sk-classify-purple-bg);
    border-color: var(--sk-classify-purple-bdr);
}
/* Teal — learning-focused (training, academic) */
.org-teal {
    color: var(--sk-classify-teal);
    background: var(--sk-classify-teal-bg);
    border-color: var(--sk-classify-teal-bdr);
}
/* Warm blue — channel/partners (GSI, distributor, services, LMS, content dev) */
.org-blue {
    color: var(--sk-classify-blue);
    background: var(--sk-classify-blue-bg);
    border-color: var(--sk-classify-blue-bdr);
}

/* ── Product subcategory badges (always purple — classification) ── */
.badge-cat {
    display: inline-block; font-size: 0.6rem; font-weight: 700;
    padding: 2px 7px; border-radius: 5px; white-space: nowrap;
    color: var(--sk-classify-purple);
    background: var(--sk-classify-purple-bg);
    border: 1px solid var(--sk-classify-purple-bdr);
    letter-spacing: 0.04em;
}

/* ── Deployment model badges ──────────────────────────────────── */
.badge-deploy {
    display: inline-block; font-size: 0.58rem; font-weight: 800;
    padding: 2px 7px; border-radius: 4px; white-space: nowrap;
    letter-spacing: 0.06em; text-transform: uppercase;
}
.badge-deploy-green { background: rgba(36,237,155,0.08); color: var(--sk-accent-pale); border: 1px solid rgba(36,237,155,0.18); }
.badge-deploy-gray  { background: rgba(148,163,184,0.08); color: var(--sk-context); border: 1px solid rgba(148,163,184,0.18); }
.badge-deploy-amber { background: rgba(245,158,11,0.1); color: var(--sk-score-mid); border: 1px solid rgba(245,158,11,0.25); }

/* ── Scoring badge chips ──────────────────────────────────────── */
.badge-green { color: var(--sk-accent); border-color: rgba(36,237,155,0.2); background: rgba(36,237,155,0.05); }
.badge-gray  { color: var(--sk-context); border-color: rgba(148,163,184,0.2); background: rgba(148,163,184,0.05); }
.badge-amber { color: var(--sk-score-mid); border-color: rgba(245,158,11,0.2); background: rgba(245,158,11,0.05); }
.badge-red   { color: var(--sk-score-low); border-color: rgba(224,82,82,0.2); background: rgba(224,82,82,0.05); }

.dim-badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.8rem; padding: 4px 10px; border-radius: 5px;
    border: 1px solid; width: fit-content;
}

/* ── Verdict label chips — 10 verdicts, 5 colors ──────────────── */
.verdict-badge {
    font-size: 1rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 6px; display: inline-block;
}
.verdict-dark-green  { color: var(--sk-accent); background: rgba(36,237,155,0.1); border: 1px solid rgba(36,237,155,0.3); }
.verdict-green       { color: var(--sk-accent-muted); background: rgba(125,216,184,0.08); border: 1px solid rgba(125,216,184,0.25); }
.verdict-light-amber { color: var(--sk-score-mid); background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.2); }
.verdict-amber       { color: var(--sk-score-mid); background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25); }
.verdict-red         { color: var(--sk-score-low); background: rgba(224,82,82,0.08); border: 1px solid rgba(224,82,82,0.3); }

/* ── Discovery tier colors ────────────────────────────────────── */
.t-pr { color: var(--sk-accent); }
.t-po { color: var(--sk-accent-pale); }
.t-u  { color: var(--sk-score-mid); }
.t-ul { color: var(--sk-score-low-soft); }

/* ── Hero badge chips ───────────────────────────────────────────── */
.hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 0.82rem; font-weight: 500;
    padding: 5px 12px; border-radius: 6px; border: 1px solid;
}

/* ── Evidence source links ──────────────────────────────────────── */
.ev-source {
    font-size: 0.72rem; color: var(--sk-text-dim);
    margin-left: 4px; white-space: nowrap;
}
.ev-source:hover { color: var(--sk-accent); }

/* ── Score bars ─────────────────────────────────────────────────── */
.score-bar {
    height: 6px; border-radius: 3px; background: var(--sk-border);
    overflow: hidden;
}
.score-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--sk-accent), var(--sk-score-mid));
    transition: width 0.4s ease;
}
