<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Researching {{ search_label }}...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #06100c;
            background-image:
                linear-gradient(rgba(36,237,155,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(36,237,155,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            color: #e8f5f0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: #0d1a14; border: 1px solid #1e3329;
            border-radius: 20px; padding: 52px 48px;
            text-align: center; max-width: 480px; width: 90%;
            box-shadow: 0 0 0 1px rgba(36,237,155,0.05), 0 30px 80px rgba(0,0,0,0.5);
        }
        .logo { margin-bottom: 32px; }
        .logo img { height: 32px; }
        .eyebrow {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: #24ED9B;
            margin-bottom: 12px;
        }
        .company-name {
            font-size: 2rem; font-weight: 800; color: #e8f5f0;
            margin-bottom: 36px; letter-spacing: -0.02em;
        }
        .status {
            color: #6b9e88; font-size: 0.9rem;
            min-height: 22px; margin-bottom: 28px;
            transition: opacity 0.3s;
        }
        .dots { display: flex; justify-content: center; gap: 8px; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #24ED9B;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="https://www.skillable.com/wp-content/uploads/2023/10/Skillable-Logo-color-1.svg" alt="Skillable" onerror="this.style.display='none'">
        </div>
        <div class="eyebrow">Researching</div>
        <div class="company-name">{{ search_label }}</div>
        <div class="status" id="status">Starting research...</div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        const source = new EventSource("/inspector/discover/progress/{{ discovery_id }}");
        source.onmessage = function(e) {
            const msg = e.data;
            if (msg.startsWith("status:")) {
                document.getElementById("status").textContent = msg.slice(7);
            } else if (msg.startsWith("done:")) {
                source.close();
                window.location.href = "/inspector/select/" + msg.slice(5);
            } else if (msg.startsWith("error:")) {
                source.close();
                document.getElementById("status").textContent = "Error: " + msg.slice(6);
            }
        };
        source.onerror = function() {
            document.getElementById("status").textContent = "Something went wrong. Please try again.";
        };
    </script>
</body>
</html>
