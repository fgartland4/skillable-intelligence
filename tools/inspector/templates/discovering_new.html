<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <title>Researching {{ company_name }}... — Skillable Intelligence</title>
    <style>
        {% include '_theme_new.html' %}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--sk-bg);
            background-image:
                linear-gradient(rgba(36,237,155,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(36,237,155,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            color: var(--sk-text);
            min-height: 100vh;
            display: flex; flex-direction: column;
        }
        .waiting-page-content {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: var(--sk-surface); border: 1px solid var(--sk-border);
            border-radius: 20px; padding: 52px 48px;
            text-align: center; max-width: 480px; width: 90%;
            box-shadow: 0 0 0 1px rgba(36,237,155,0.05), 0 30px 80px rgba(0,0,0,0.5);
            position: relative;
        }
        .logo { margin-bottom: 32px; }
        .logo img { height: 32px; }
        .eyebrow {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--sk-accent); margin-bottom: 12px;
        }
        .company-name {
            font-size: 2rem; font-weight: 800; color: var(--sk-text);
            margin-bottom: 36px; letter-spacing: -0.02em;
        }
        .status {
            color: var(--sk-text-muted); font-size: 0.9rem;
            min-height: 22px; margin-bottom: 28px;
        }
        .dots { display: flex; justify-content: center; gap: 8px; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--sk-accent);
            animation: pulse 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .progress-track {
            width: 100%; height: 3px; background: var(--sk-border);
            border-radius: 2px; overflow: hidden; margin: 28px 0 10px;
        }
        .progress-fill {
            height: 100%; width: 0%; background: var(--sk-accent);
            border-radius: 2px; transition: width 1.2s ease;
        }
        .timer {
            font-size: 0.78rem; color: var(--sk-text-dim); margin-bottom: 16px;
        }
        .error-state { display: none; margin-top: 24px; }
        .error-msg {
            color: var(--sk-score-low-soft); font-size: 0.9rem; line-height: 1.6;
            background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.2);
            border-radius: 10px; padding: 14px 18px; margin-bottom: 20px;
        }
        .btn-back {
            display: inline-block; padding: 11px 28px;
            background: rgba(36,237,155,0.08); border: 1px solid rgba(36,237,155,0.25);
            color: var(--sk-accent); border-radius: 10px; font-size: 0.9rem;
            font-weight: 600; cursor: pointer; text-decoration: none;
        }
        .btn-back:hover { background: rgba(36,237,155,0.15); }
        .cancel-btn {
            position: absolute; top: 16px; right: 20px;
            background: none; border: none; color: var(--sk-text-dim);
            font-size: 1.4rem; cursor: pointer; text-decoration: none;
            line-height: 1; padding: 4px;
        }
        .cancel-btn:hover { color: var(--sk-text-muted); }
    </style>
</head>
<body>
    {% include '_nav_new.html' %}
    <div class="waiting-page-content">
    <div class="card">
        <a href="/inspector" class="cancel-btn" title="Cancel">&times;</a>
        <div class="logo">
            <img src="/static/img/skillable-logo.svg" alt="Skillable"
                 onerror="this.src='https://www.skillable.com/wp-content/uploads/2023/10/Skillable-Logo-color-1.svg'; this.onerror=null;">
        </div>
        <div class="eyebrow">Researching</div>
        <div class="company-name">{{ company_name }}</div>
        <div class="status" id="status">Searching for products...</div>
        <div class="dots" id="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="timer" id="timer">research has been running for <strong>0:00</strong></div>

        <div class="error-state" id="errorState">
            <div class="error-msg" id="errorMsg"></div>
            <a href="/inspector" class="btn-back">&larr; New Search</a>
        </div>
    </div>
    </div>

    <script>
    (function() {
        const source = new EventSource("/inspector/discover/progress/{{ discovery_id }}");

        source.onmessage = function(e) {
            const msg = e.data;
            if (msg.startsWith("status:")) {
                document.getElementById("status").textContent = msg.slice(7);
            } else if (msg.startsWith("done:")) {
                source.close();
                document.getElementById("status").textContent = "Complete — loading products...";
                document.getElementById("progressFill").style.width = "100%";
                // Use replace() so this transient waiting page does NOT stay in
                // browser history — back from Product Selection skips it.
                window.location.replace("/inspector/product-selection/" + msg.slice(5));
            } else if (msg.startsWith("error:")) {
                source.close();
                showError(msg.slice(6));
            }
        };

        source.onerror = function() {
            source.close();
            showError("Connection lost. Please try again.");
        };

        function showError(message) {
            document.getElementById("status").style.display = "none";
            document.getElementById("dots").style.display = "none";
            document.getElementById("timer").style.display = "none";
            document.getElementById("errorMsg").textContent = message;
            document.getElementById("errorState").style.display = "block";
        }

        // Progress bar animation
        let pct = 0;
        setInterval(function() {
            pct = Math.min(pct + 0.4, 85);
            document.getElementById("progressFill").style.width = pct + "%";
        }, 300);

        // Timer
        const t0 = Date.now();
        setInterval(function() {
            const s = Math.floor((Date.now() - t0) / 1000);
            document.getElementById("timer").innerHTML =
                'research has been running for <strong>' +
                Math.floor(s/60) + ':' + String(s%60).padStart(2,'0') + '</strong>';
        }, 1000);
    })();
    </script>
</body>
</html>
