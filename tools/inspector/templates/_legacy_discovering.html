<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <title>Researching {{ search_label }}...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        button { font-family: inherit; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #06100c;
            background-image:
                linear-gradient(rgba(36,237,155,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(36,237,155,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            color: #e8f5f0;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: #0d1a14; border: 1px solid #1e3329;
            border-radius: 20px; padding: 52px 48px;
            text-align: center; max-width: 480px; width: 90%;
            box-shadow: 0 0 0 1px rgba(36,237,155,0.05), 0 30px 80px rgba(0,0,0,0.5);
        }
        .logo { margin-bottom: 32px; }
        .logo img { height: 32px; }
        .eyebrow {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
            text-transform: uppercase; color: #24ED9B;
            margin-bottom: 12px;
        }
        .company-name {
            font-size: 2rem; font-weight: 800; color: #e8f5f0;
            margin-bottom: 36px; letter-spacing: -0.02em;
        }
        .status {
            color: #6b9e88; font-size: 0.9rem;
            min-height: 22px; margin-bottom: 28px;
            transition: opacity 0.3s;
        }
        .dots { display: flex; justify-content: center; gap: 8px; }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #24ED9B;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        /* Progress mark */
        .mark-track { width: 100%; height: 3px; background: #122019; border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
        .mark-fill { height: 100%; width: 0%; background: #24ED9B; border-radius: 2px; transition: width 1.2s ease; }
        .mark-el { transition: fill 0.45s ease; }
        @keyframes mark-pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .mark-active { animation: mark-pulse 1.2s ease-in-out infinite; }

        .error-state { display: none; margin-top: 24px; }
        .error-msg {
            color: #f87171; font-size: 0.9rem; line-height: 1.6;
            background: rgba(248,113,113,0.07); border: 1px solid rgba(248,113,113,0.2);
            border-radius: 10px; padding: 14px 18px; margin-bottom: 20px;
        }
        .btn-back {
            display: inline-block; padding: 11px 28px;
            background: rgba(36,237,155,0.08); border: 1px solid rgba(36,237,155,0.25);
            color: #24ED9B; border-radius: 10px; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; text-decoration: none; transition: background 0.15s;
        }
        .btn-back:hover { background: rgba(36,237,155,0.15); }
        .cancel-btn {
            position: absolute; top: 16px; right: 20px;
            background: none; border: none; color: #3d6655;
            font-size: 1.4rem; cursor: pointer; text-decoration: none;
            line-height: 1; padding: 4px;
            transition: color 0.15s;
        }
        .cancel-btn:hover { color: #6b9e88; }
    </style>
</head>
<body>
    <div class="card" style="position: relative;">
        <a href="/inspector" class="cancel-btn" title="Cancel and go back">&times;</a>
        <div class="logo">
            <img src="https://www.skillable.com/wp-content/uploads/2023/10/Skillable-Logo-color-1.svg" alt="Skillable" onerror="this.style.display='none'">
        </div>
        <div class="eyebrow">Researching</div>
        <div class="company-name">{{ search_label }}</div>
        <div class="status" id="status">Starting research...</div>
        <div class="dots" id="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <!-- Progress mark -->
        <div style="text-align:center; margin-top:28px;">
            <div class="mark-track"><div class="mark-fill" id="mark-fill"></div></div>
            <div id="timer" style="font-size:0.85rem;color:#3d6655;margin-bottom:16px;">research and scoring has been running for <strong>0:00</strong></div>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="28.5 -0.5 21.5 38.5" width="28" height="48">
                <path id="mark-i" class="mark-el mark-active"
                    fill-rule="evenodd" clip-rule="evenodd"
                    d="M31.8203 36.3587H35.4225V22.8284H31.8203V36.3587Z" fill="#e8f5f0"/>
                <path id="mark-l1" class="mark-el"
                    fill-rule="evenodd" clip-rule="evenodd"
                    d="M38.511 36.3587H42.118V17.5439H38.511V36.3587Z" fill="#1e3329"/>
                <path id="mark-l2" class="mark-el"
                    fill-rule="evenodd" clip-rule="evenodd"
                    d="M45.2032 36.3586H48.8134V10.2878H45.2032V36.3586Z" fill="#1e3329"/>
                <path id="mark-check" class="mark-el"
                    fill-rule="evenodd" clip-rule="evenodd"
                    d="M45.8683 0L33.957 13.3398L32.3133 11.8098L29.9446 14.4504L33.9397 18.3333L48.2779 2.34634L45.8683 0Z" fill="#1e3329"/>
            </svg>
        </div>

        <div class="error-state" id="error-state">
            <div class="error-msg" id="error-msg"></div>
            <a href="/inspector/" class="btn-back">&larr; New Search</a>
        </div>
    </div>

    <script>
        const source = new EventSource("/inspector/discover/progress/{{ discovery_id }}");
        source.onmessage = function(e) {
            const msg = e.data;
            if (msg.startsWith("status:")) {
                document.getElementById("status").textContent = msg.slice(7);
            } else if (msg.startsWith("done:")) {
                source.close();
                window.location.href = "/inspector/product-selection/" + msg.slice(5);
            } else if (msg.startsWith("error:")) {
                source.close();
                document.getElementById("status").style.display = "none";
                document.getElementById("dots").style.display = "none";
                document.getElementById("timer").style.display = "none";
                document.getElementById("error-msg").textContent = msg.slice(6);
                document.getElementById("error-state").style.display = "block";
            }
        };
        source.onerror = function() {
            source.close();
            document.getElementById("status").style.display = "none";
            document.getElementById("dots").style.display = "none";
            document.getElementById("timer").style.display = "none";
            document.getElementById("error-msg").textContent = "Something went wrong. Please try again.";
            document.getElementById("error-state").style.display = "block";
        };

        // Animate progress bar and mark during discovery
        let fillPct = 0;
        const fillInterval = setInterval(() => {
            fillPct = Math.min(fillPct + 0.4, 85);
            document.getElementById('mark-fill').style.width = fillPct + '%';
            if (fillPct > 30) { document.getElementById('mark-i').setAttribute('fill','#e8f5f0'); document.getElementById('mark-i').classList.remove('mark-active'); }
            if (fillPct > 55) { document.getElementById('mark-l1').setAttribute('fill','#e8f5f0'); }
        }, 300);

        const _t0 = Date.now();
        setInterval(() => {
            const s = Math.floor((Date.now() - _t0) / 1000);
            document.getElementById('timer').innerHTML =
                `research and scoring has been running for <strong>${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}</strong>`;
        }, 1000);
    </script>
</body>
</html>
