<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospector Running — Skillable Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #06100c;
            background-image:
                linear-gradient(rgba(36,237,155,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(36,237,155,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            color: #e8f5f0; min-height: 100vh;
            display: flex; align-items: flex-start; justify-content: center;
            padding: 24px 16px 32px;
        }
        .card {
            background: #0d1a14; border: 1px solid #1e3329; border-radius: 20px;
            padding: 24px 28px; max-width: 560px; width: 100%;
        }
        .card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
        .spinner {
            width: 28px; height: 28px; flex-shrink: 0;
            border: 2.5px solid #1e3329; border-top-color: #24ED9B;
            border-radius: 50%; animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .header-text h1 { font-size: 1.25rem; font-weight: 800; color: #e8f5f0; }
        .header-text .sub { font-size: 0.8rem; color: #6b9e88; margin-top: 2px; }

        /* Progress bar */
        .progress-wrap { margin-bottom: 24px; }
        .progress-bar-track { height: 4px; background: #1e3329; border-radius: 2px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #24ED9B; border-radius: 2px; transition: width 0.4s ease; width: 0%; }
        .progress-meta { display: flex; justify-content: space-between; margin-top: 7px; font-size: 0.72rem; color: #3d6655; }

        /* Two-column company list */
        .company-grid-wrap {
            border: 1px solid #1e3329; border-radius: 10px; overflow: hidden;
            max-height: 360px; overflow-y: auto;
        }
        .company-grid-wrap::-webkit-scrollbar { width: 6px; }
        .company-grid-wrap::-webkit-scrollbar-track { background: #0d1a14; }
        .company-grid-wrap::-webkit-scrollbar-thumb { background: #1e3329; border-radius: 3px; }
        .company-grid {
            display: grid;
            grid-template-columns: 1fr 52px;
            gap: 0;
        }
        .company-row {
            display: contents;
        }
        .company-row .col-name,
        .company-row .col-status {
            padding: 9px 14px;
            border-bottom: 1px solid #0d1a14;
            font-size: 0.82rem;
            display: flex; align-items: center;
        }
        .company-row:last-child .col-name,
        .company-row:last-child .col-status { border-bottom: none; }
        .company-row .col-name { color: #6b9e88; }
        .company-row .col-status { justify-content: center; }

        /* Status states */
        .status-waiting { width: 8px; height: 8px; background: #1e3329; border-radius: 50%; }
        .status-analyzing {
            width: 8px; height: 8px; background: #24ED9B; border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
        .status-done { color: #24ED9B; font-size: 0.88rem; font-weight: 700; line-height: 1; }
        .status-error { color: #f87171; font-size: 0.82rem; }

        /* Name highlight states */
        .col-name.is-analyzing { color: #a8d5c2; }
        .col-name.is-done { color: #3d6655; }

        /* Footer actions */
        .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; }
        .timer { font-size: 0.72rem; color: #2a4a3a; }
        .btn-cancel {
            background: none; border: 1px solid #1e3329; color: #3d6655;
            padding: 7px 16px; border-radius: 8px; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s; font-family: inherit;
        }
        .btn-cancel:hover { border-color: rgba(248,113,113,0.4); color: #f87171; }
        .btn-cancel:disabled { opacity: 0.35; cursor: default; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="spinner" id="spinner"></div>
            <div class="header-text">
                <h1>Prospector Running</h1>
                <div class="sub">Scoring {{ company_count }} {{ 'company' if company_count == 1 else 'companies' }}</div>
            </div>
        </div>

        <div class="progress-wrap">
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
            <div class="progress-meta">
                <span id="progress-text">0 / {{ company_count }} complete</span>
                <span id="timer">0:00 elapsed</span>
            </div>
        </div>

        <div class="company-grid-wrap">
            <div class="company-grid" id="company-grid">
                {% for name in company_names %}
                <div class="company-row" id="row-{{ loop.index0 }}" data-name="{{ name | e }}">
                    <div class="col-name" id="name-{{ loop.index0 }}">{{ name }}</div>
                    <div class="col-status" id="status-{{ loop.index0 }}">
                        <span class="status-waiting"></span>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="card-footer">
            <div class="timer" id="timer-footer"></div>
            <button class="btn-cancel" id="btn-cancel" onclick="cancelRun()">Cancel run</button>
        </div>
    </div>

    <script>
        const jobId = "{{ job_id }}";
        const total = {{ company_count }};
        let completed = 0;

        // Build name → row index map
        const nameMap = {};
        document.querySelectorAll('.company-row').forEach((row, i) => {
            nameMap[row.dataset.name] = i;
        });

        function setStatus(name, state) {
            const i = nameMap[name];
            if (i === undefined) return;
            const nameEl = document.getElementById(`name-${i}`);
            const statusEl = document.getElementById(`status-${i}`);
            if (state === 'analyzing') {
                nameEl.className = 'col-name is-analyzing';
                statusEl.innerHTML = '<span class="status-analyzing"></span>';
            } else if (state === 'done') {
                nameEl.className = 'col-name is-done';
                statusEl.innerHTML = '<span class="status-done">✓</span>';
            } else if (state === 'error') {
                nameEl.className = 'col-name';
                statusEl.innerHTML = '<span class="status-error">✗</span>';
            }
        }

        const es = new EventSource(`/prospector/status/${jobId}`);
        es.onmessage = function(e) {
            const msg = e.data;
            if (msg.startsWith("status:")) {
                const text = msg.slice(7);
                const m = text.match(/^Analyzing (.+)\.\.\.$/);
                if (m) setStatus(m[1], 'analyzing');
            } else if (msg.startsWith("progress:")) {
                completed++;
                const name = msg.slice(9);
                setStatus(name, 'done');
                document.getElementById('progress-text').textContent = `${completed} / ${total} complete`;
                document.getElementById('progress-bar').style.width = `${Math.round((completed / total) * 100)}%`;
            } else if (msg.startsWith("done:")) {
                es.close();
                document.getElementById('spinner').style.borderTopColor = '#3d6655';
                document.getElementById('spinner').style.animation = 'none';
                window.location.href = `/prospector/results/${msg.slice(5)}`;
            } else if (msg.startsWith("error:")) {
                es.close();
                document.getElementById('progress-text').textContent = 'An error occurred.';
            }
        };
        es.onerror = function() { es.close(); };

        // Timer
        const startTime = Date.now();
        const timerEl = document.getElementById('timer');
        setInterval(() => {
            const s = Math.floor((Date.now() - startTime) / 1000);
            const em = Math.floor(s / 60), es2 = s % 60;
            const eStr = `${em}:${es2.toString().padStart(2,'0')}`;
            if (completed > 0 && completed < total) {
                const rate = s / completed;
                const rem = Math.max(0, Math.round(rate * (total - completed)));
                const rm = Math.floor(rem / 60), rs = rem % 60;
                timerEl.textContent = `${eStr} elapsed · ~${rm}:${rs.toString().padStart(2,'0')} remaining`;
            } else {
                timerEl.textContent = `${eStr} elapsed`;
            }
        }, 1000);

        function cancelRun() {
            const btn = document.getElementById('btn-cancel');
            btn.disabled = true;
            btn.textContent = 'Cancelling...';
            fetch(`/prospector/cancel/${jobId}`, { method: 'POST' });
        }
    </script>
</body>
</html>
