<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <style>
    .chip  { fill: none; stroke: #6B2D8B; stroke-width: 9; stroke-linejoin: round; stroke-linecap: round; }
    .wire  { fill: none; stroke: #6B2D8B; stroke-width: 8; stroke-linejoin: round; stroke-linecap: round; }
    .node  { fill: none; stroke: #6B2D8B; stroke-width: 8; }
    .label { font-family: Arial, Calibri, sans-serif; font-size: 40px; font-weight: bold;
              fill: #6B2D8B; text-anchor: middle; dominant-baseline: central;
              letter-spacing: 2px; }
  </style>

  <!-- ── Center chip ── -->
  <rect x="70" y="70" width="80" height="80" rx="10" ry="10" class="chip"/>

  <!-- ── AI label ── -->
  <text x="110" y="111" class="label">AI</text>

  <!-- ── Top wires (2) ── -->
  <polyline points="88,70 88,50 78,50 78,22" class="wire"/>
  <polyline points="132,70 132,50 142,50 142,22" class="wire"/>
  <circle cx="78"  cy="22" r="9" class="node"/>
  <circle cx="142" cy="22" r="9" class="node"/>

  <!-- ── Bottom wires (2) ── -->
  <polyline points="88,150 88,170 78,170 78,198" class="wire"/>
  <polyline points="132,150 132,170 142,170 142,198" class="wire"/>
  <circle cx="78"  cy="198" r="9" class="node"/>
  <circle cx="142" cy="198" r="9" class="node"/>

  <!-- ── Left wires (2) ── -->
  <polyline points="70,88 50,88 50,78 22,78" class="wire"/>
  <polyline points="70,132 50,132 50,142 22,142" class="wire"/>
  <circle cx="22" cy="78"  r="9" class="node"/>
  <circle cx="22" cy="142" r="9" class="node"/>

  <!-- ── Right wires (2) ── -->
  <polyline points="150,88 170,88 170,78 198,78" class="wire"/>
  <polyline points="150,132 170,132 170,142 198,142" class="wire"/>
  <circle cx="198" cy="78"  r="9" class="node"/>
  <circle cx="198" cy="142" r="9" class="node"/>
</svg>